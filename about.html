<h2 data-en="About Us" data-fr="À propos de nous"></h2>

<!-- WHO WE ARE -->
<h3 data-en="Who We Are" data-fr="Qui sommes-nous"></h3>

<p data-en="Mercy Association (AMI) is a non-governmental and non-profit organization founded in 2001 and officially recognized in 2016 in the Democratic Republic of Congo."
   data-fr="L’Association Miséricorde (AMI) est une organisation non gouvernementale et à but non lucratif fondée en 2001 et officiellement reconnue en 2016 en République Démocratique du Congo.">
</p>

<p data-en="Our main office is located in Minembwe, with a secondary office in Bukavu, South Kivu Province. We work closely with local communities to respond to their most urgent needs."
   data-fr="Notre siège principal est situé à Minembwe, avec un bureau secondaire à Bukavu, dans la province du Sud-Kivu. Nous travaillons en étroite collaboration avec les communautés locales pour répondre à leurs besoins les plus urgents.">
</p>

<!-- MISSION -->
<h3 data-en="Our Mission" data-fr="Notre mission"></h3>

<p data-en="Our mission is to promote sustainable development and empower vulnerable communities, especially women and orphaned children, by improving their living conditions and access to essential services."
   data-fr="Notre mission est de promouvoir le développement durable et de renforcer les communautés vulnérables, en particulier les femmes et les enfants orphelins, en améliorant leurs conditions de vie et leur accès aux services essentiels.">
</p>

<!-- VISION -->
<h3 data-en="Our Vision" data-fr="Notre vision"></h3>

<p data-en="We envision a society where all vulnerable communities live with dignity, equality, and full access to basic services such as education, healthcare, and nutrition."
   data-fr="Nous aspirons à une société où toutes les communautés vulnérables vivent dans la dignité, l’égalité et avec un accès complet aux services de base tels que l’éducation, la santé et la nutrition.">
</p>

<!-- VALUES -->
<h3 data-en="Our Values" data-fr="Nos valeurs"></h3>

<ul>
<li data-en="Compassion and solidarity"
    data-fr="Compassion et solidarité"></li>

<li data-en="Transparency and accountability"
    data-fr="Transparence et responsabilité"></li>

<li data-en="Community empowerment"
    data-fr="Autonomisation des communautés"></li>

<li data-en="Sustainable development"
    data-fr="Développement durable"></li>
</ul>
